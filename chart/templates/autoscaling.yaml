          averageUtilization: {{ .Values.anonymizer.autoscaling.cpuAverageUtilization }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: {{ .Values.anonymizer.autoscaling.scaleUpStabilizationWindowSeconds }}
      policies:
        - type: Pods
          value: 2
